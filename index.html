<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎮 Game Time Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  button { font-family: Arial, Helvetica, sans-serif; cursor: pointer; }

  #header {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid rgba(255,255,255,0.2);
    position: sticky; top: 0; z-index: 50;
  }
  #header-title { font-size: 19px; font-weight: 700; color: #fff; }
  #header-sub { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  #bank-badge {
    background: rgba(255,255,255,0.97); border-radius: 14px;
    padding: 7px 13px; text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15); min-width: 80px;
  }
  #bank-label { font-size: 10px; font-weight: 700; color: #764ba2; text-transform: uppercase; letter-spacing: 1px; }
  #bank-value { font-size: 20px; font-weight: 700; color: #48BB78; line-height: 1.1; }
  #bank-blocks { font-size: 10px; color: #999; }

  #toast {
    display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #fff; border-radius: 16px; padding: 12px 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 200;
    text-align: center; border: 3px solid #48BB78; white-space: nowrap;
    animation: popIn 0.3s ease;
  }
  #toast.show { display: block; }
  #toast-icon { font-size: 24px; }
  #toast-msg { font-weight: 700; color: #276749; font-size: 14px; }
  #toast-name { font-size: 12px; color: #666; }

  #content { max-width: 480px; margin: 0 auto; padding: 0 12px; }

  #filter-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 0 6px; overflow-x: auto; scrollbar-width: none;
  }
  #filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.25);
    border: none; border-radius: 18px; padding: 5px 12px;
    font-size: 12px; color: #fff; font-weight: 400; transition: all 0.15s;
  }
  .filter-btn.active { background: #fff; color: #764ba2; font-weight: 700; }
  #edit-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.25);
    border: none; border-radius: 18px; padding: 5px 12px;
    font-size: 12px; color: #fff; font-weight: 700; transition: all 0.15s;
    margin-left: auto;
  }
  #edit-btn.active { background: #FC8181; }
  #edit-hint {
    display: none; background: rgba(252,129,129,0.2);
    border: 2px solid rgba(252,129,129,0.5);
    border-radius: 10px; padding: 7px 12px; margin-bottom: 8px;
    font-size: 12px; color: #fff;
  }
  #edit-hint.show { display: block; }

  .task-card {
    border-radius: 14px; padding: 11px 13px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-width: 2px; border-style: solid;
  }
  .task-emoji { font-size: 26px; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-weight: 600; font-size: 13px; color: #2D3748; line-height: 1.3; }
  .task-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .tag { border-radius: 7px; padding: 2px 7px; font-size: 11px; font-weight: 600; color: #fff; }
  .done-btn {
    background: linear-gradient(135deg, #48BB78, #38A169);
    border: none; border-radius: 10px; color: #fff;
    font-weight: 700; font-size: 13px; padding: 8px 12px;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(72,187,120,0.4); white-space: nowrap;
  }
  .del-btn {
    background: linear-gradient(135deg, #FC8181, #E53E3E);
    border: none; border-radius: 10px; color: #fff;
    font-weight: 700; font-size: 15px; padding: 8px 12px; flex-shrink: 0;
  }

  /* Add activity card */
  .add-card {
    border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
    background: rgba(255,255,255,0.15);
    border: 2px dashed rgba(255,255,255,0.5);
    display: flex; align-items: center; gap: 12;
    cursor: pointer; transition: background 0.15s;
  }
  .add-card:hover { background: rgba(255,255,255,0.22); }
  .add-card-icon { font-size: 26px; flex-shrink: 0; }
  .add-card-text { font-weight: 600; font-size: 14px; color: #fff; }
  .add-card-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }

  .empty-state {
    text-align: center; padding: 40px 20px;
    background: rgba(255,255,255,0.85); border-radius: 16px; margin-top: 8px;
  }
  .empty-state .big { font-size: 40px; }
  .empty-state p { font-weight: 700; color: #764ba2; font-size: 15px; margin-top: 8px; }

  #stats-bar {
    background: rgba(255,255,255,0.95); border-radius: 16px;
    padding: 14px; margin-bottom: 14px; display: flex;
    justify-content: space-around; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .stat { text-align: center; }
  .stat-icon { font-size: 18px; }
  .stat-val { font-weight: 700; font-size: 17px; color: #764ba2; }
  .stat-lbl { font-size: 11px; color: #999; }

  .log-entry {
    background: rgba(255,255,255,0.95); border-radius: 13px;
    padding: 10px 13px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .log-emoji { font-size: 22px; }
  .log-name { font-weight: 600; color: #2D3748; font-size: 13px; }
  .log-date { font-size: 11px; color: #999; margin-top: 2px; }
  .log-earn { background: #E8F5E9; color: #276749; border-radius: 7px; padding: 3px 9px; font-weight: 700; font-size: 12px; margin-left: auto; flex-shrink: 0; }

  #bank-big {
    background: rgba(255,255,255,0.97); border-radius: 20px;
    padding: 22px 18px; text-align: center; margin-bottom: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  #bank-big-label { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1.5px; }
  #bank-big-value { font-size: 52px; font-weight: 700; color: #48BB78; line-height: 1.1; margin: 6px 0; }
  #bank-big-blocks { font-size: 14px; color: #764ba2; font-weight: 600; }
  #stars { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }

  .card {
    background: rgba(255,255,255,0.95); border-radius: 16px;
    padding: 14px; margin-bottom: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .card-title { font-weight: 700; font-size: 14px; color: #764ba2; margin-bottom: 10px; }
  .window-row { display: flex; align-items: center; gap: 10; padding: 7px 0; border-bottom: 1px solid #F0F0F0; }
  .window-icon { font-size: 18px; }
  .window-day { font-weight: 600; color: #2D3748; font-size: 14px; }
  .window-time { font-size: 12px; color: #999; }
  .rollover { font-size: 12px; color: #48BB78; font-weight: 600; margin-top: 8px; }
  .amount-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .amount-btn {
    flex: 1; background: #F0F0F0; color: #555;
    border: none; border-radius: 10px; padding: 10px 0;
    font-weight: 700; font-size: 13px; transition: all 0.15s;
  }
  .amount-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  #use-btn {
    width: 100%; background: linear-gradient(135deg, #48BB78, #38A169);
    border: none; border-radius: 13px; color: #fff;
    font-weight: 700; font-size: 15px; padding: 13px;
    box-shadow: 0 4px 15px rgba(72,187,120,0.4); transition: all 0.15s;
  }
  #use-btn:disabled { background: #E0E0E0; color: #999; box-shadow: none; cursor: not-allowed; }
  #used-note { text-align: center; margin-top: 8px; font-size: 12px; color: #999; }

  #nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(10px);
    display: flex; justify-content: space-around;
    padding: 10px 0 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .nav-btn {
    background: none; border: none;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 4px 24px; opacity: 0.4; transition: opacity 0.15s;
  }
  .nav-btn.active { opacity: 1; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-btn.active .nav-label { color: #764ba2; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #764ba2; margin-top: 1px; visibility: hidden; }
  .nav-btn.active .nav-dot { visibility: visible; }

  /* Generic overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 300;
    align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 22px;
    max-width: 320px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-box .modal-emoji { font-size: 38px; text-align: center; }
  .modal-title { font-weight: 700; font-size: 16px; color: #2D3748; margin: 8px 0 5px; text-align: center; }
  .modal-body { font-size: 14px; color: #666; margin-bottom: 18px; text-align: center; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1; background: #F0F0F0; border: none; border-radius: 11px;
    padding: 11px; font-weight: 700; font-size: 14px; color: #666;
  }
  .btn-danger {
    flex: 1; background: linear-gradient(135deg, #FC8181, #E53E3E);
    border: none; border-radius: 11px; padding: 11px;
    font-weight: 700; font-size: 14px; color: #fff;
    box-shadow: 0 4px 12px rgba(229,62,62,0.35);
  }
  .btn-primary {
    flex: 1; background: linear-gradient(135deg, #667eea, #764ba2);
    border: none; border-radius: 11px; padding: 11px;
    font-weight: 700; font-size: 14px; color: #fff;
    box-shadow: 0 4px 12px rgba(118,75,162,0.35);
  }

  /* Add activity form */
  .form-label { font-size: 12px; font-weight: 700; color: #764ba2; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; border: 2px solid #E2E8F0; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; font-family: Arial, Helvetica, sans-serif;
    color: #2D3748; outline: none; transition: border 0.15s; margin-bottom: 14px;
  }
  .form-input:focus { border-color: #764ba2; }
  .emoji-grid {
    display: grid; grid-template-columns: repeat(8, 1fr);
    gap: 6px; margin-bottom: 14px;
  }
  .emoji-opt {
    font-size: 20px; background: #F7FAFC; border: 2px solid transparent;
    border-radius: 8px; padding: 4px; text-align: center; cursor: pointer;
    transition: all 0.1s;
  }
  .emoji-opt.selected { border-color: #764ba2; background: #EDE9FE; }
  .cat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-bottom: 16px;
  }
  .cat-opt {
    font-size: 12px; font-weight: 600; background: #F7FAFC;
    border: 2px solid transparent; border-radius: 8px;
    padding: 7px 8px; text-align: center; cursor: pointer;
    transition: all 0.1s; color: #555;
  }
  .cat-opt.selected { border-color: #764ba2; background: #EDE9FE; color: #764ba2; }
  .dur-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .dur-btn {
    flex: 1; background: #F7FAFC; border: 2px solid transparent;
    border-radius: 8px; padding: 8px 0;
    font-size: 12px; font-weight: 600; color: #555; cursor: pointer; transition: all 0.1s;
  }
  .dur-btn.selected { border-color: #764ba2; background: #EDE9FE; color: #764ba2; }
  #add-error { font-size: 12px; color: #E53E3E; margin-bottom: 10px; display: none; }

  @keyframes popIn {
    0%   { transform: translateX(-50%) scale(0.8); opacity: 0; }
    100% { transform: translateX(-50%) scale(1);   opacity: 1; }
  }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">🎮 Game Time Tracker</div>
    <div id="header-sub">Complete tasks → Earn game time!</div>
  </div>
  <div id="bank-badge">
    <div id="bank-label">Bank</div>
    <div id="bank-value">0 min</div>
    <div id="bank-blocks">0 blocks</div>
  </div>
</div>

<div id="toast">
  <div id="toast-icon">🎉</div>
  <div id="toast-msg">+15 minutes earned!</div>
  <div id="toast-name"></div>
</div>

<div id="content"></div>

<div id="nav">
  <button class="nav-btn active" onclick="switchScreen('tasks')" id="nav-tasks">
    <span class="nav-icon">📋</span><span class="nav-label">Tasks</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="switchScreen('log')" id="nav-log">
    <span class="nav-icon">✅</span><span class="nav-label">History</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="switchScreen('bank')" id="nav-bank">
    <span class="nav-icon">🎮</span><span class="nav-label">Bank</span><div class="nav-dot"></div>
  </button>
</div>

<!-- Delete modal -->
<div class="overlay" id="delete-overlay">
  <div class="modal-box">
    <div class="modal-emoji" id="del-emoji"></div>
    <div class="modal-title">Remove this task?</div>
    <div class="modal-body" id="del-body"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Remove</button>
    </div>
  </div>
</div>

<!-- Add activity modal -->
<div class="overlay" id="add-overlay">
  <div class="modal-box" style="max-width:360px;max-height:90vh;overflow-y:auto">
    <div class="modal-title" style="margin-bottom:16px">➕ Add New Activity</div>

    <label class="form-label">Activity Name</label>
    <input class="form-input" id="new-name" placeholder="e.g. Practice piano" maxlength="60"/>

    <label class="form-label">Pick an Emoji</label>
    <div class="emoji-grid" id="emoji-grid"></div>

    <label class="form-label">Category</label>
    <div class="cat-grid" id="cat-grid"></div>

    <label class="form-label">Duration</label>
    <div class="dur-row" id="dur-row"></div>

    <div id="add-error">Please fill in the activity name.</div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-primary" onclick="saveNewTask()">Add Activity</button>
    </div>
  </div>
</div>

  "Active & Outdoor":       { bg:"#F0FFF4", border:"#48BB78" },
  "Chores":                 { bg:"#F7FAFC", border:"#718096" },
  "Social & Kindness":      { bg:"#FFF5F5", border:"#FC8181" },
  "Bonus":                  { bg:"#FFFFF0", border:"#ECC94B" },
  "Special":                { bg:"#F3E8FF", border:"#9F7AEA" },
  "Custom":                 { bg:"#FEFCBF", border:"#D69E2E" },
};

const EMOJI_OPTIONS = ["🎯","🌟","💪","🧠","🎭","🎪","🌈","🦋","🔥","💎","🎸","🏅","🎺","🌺","🦄","🐶","🐸","🦊","🌙","⚡","🍀","🎁","🚀","🎠","🏄","⛺","🎃","🧩","🎲","🌊","🏔️","🎯","🦁","🐬","🌸","🍕","🎈","🧸","🎻","🦅"];
const CAT_OPTIONS  = Object.keys(CAT_COLORS);
const DUR_OPTIONS  = ["5 min","10 min","15 min","20 min","30 min","—"];

// ── STATE ─────────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let tasks    = load('gt_tasks_v4', DEFAULT_TASKS);
let log      = load('gt_log_v4',   []);
let used     = load('gt_used_v4',  0);
let screen   = 'tasks';
let filter   = 'All';
let editMode = false;
let useAmt   = 15;
let pendingDeleteId = null;

// Add-task form state
let newEmoji = '🎯';
let newCat   = 'Custom';
let newDur   = '15 min';

// ── COMPUTED ──────────────────────────────────────────────────────────────────
function totalEarned() { return log.reduce((s,e) => s + e.earned, 0); }
function bank()        { return totalEarned() - used; }
function blocks()      { return Math.floor(bank() / 15); }
function fmtMin(m) {
  if (m < 60) return m + ' min';
  const h = Math.floor(m/60), r = m%60;
  return r ? h+'h '+r+'m' : h+'h';
}
function nextId() { return Math.max(0, ...tasks.map(t=>t.id)) + 1; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  updateHeader();
  const el = document.getElementById('content');
  if (screen==='tasks')     el.innerHTML = renderTasks();
  else if (screen==='log')  el.innerHTML = renderLog();
  else                      el.innerHTML = renderBank();
  updateNav();
}

function updateHeader() {
  document.getElementById('bank-value').textContent  = fmtMin(bank());
  const b = blocks();
  document.getElementById('bank-blocks').textContent = b + ' block' + (b!==1?'s':'');
}

function updateNav() {
  ['tasks','log','bank'].forEach(s =>
    document.getElementById('nav-'+s).classList.toggle('active', s===screen)
  );
}

function renderTasks() {
  const cats = ['All', ...Object.keys(CAT_COLORS).filter(c => tasks.some(t => t.category===c))];
  const visible = filter==='All' ? tasks : tasks.filter(t => t.category===filter);

  const filterBtns = cats.map(c =>
    `<button class="filter-btn${c===filter?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  const cards = visible.map(t => {
    const col = CAT_COLORS[t.category] || CAT_COLORS['Custom'];
    const action = editMode
      ? `<button class="del-btn" onclick="askDelete(${t.id})">🗑️</button>`
      : `<button class="done-btn" onclick="completeTask(${t.id})">✓ Done!</button>`;
    return `
      <div class="task-card" style="background:${col.bg};border-color:${col.border}">
        <div class="task-emoji">${t.emoji}</div>
        <div class="task-info">
          <div class="task-name">${t.name}</div>
          <div class="task-tags">
            <span class="tag" style="background:${col.border}">⏱ ${t.duration}</span>
            <span class="tag" style="background:#48BB78">🎮 +15 min</span>
          </div>
        </div>
        ${action}
      </div>`;
  }).join('');

  const addCard = editMode ? '' : `
    <div class="add-card" onclick="openAdd()">
      <div class="add-card-icon">➕</div>
      <div>
        <div class="add-card-text">Add a New Activity</div>
        <div class="add-card-sub">Create a custom task that saves for future sessions</div>
      </div>
    </div>`;

  return `
    <div id="filter-bar">
      ${filterBtns}
      <button id="edit-btn" class="${editMode?'active':''}" onclick="toggleEdit()">${editMode?'✓ Done':'✏️ Edit'}</button>
    </div>
    <div id="edit-hint" class="${editMode?'show':''}">Tap 🗑️ to permanently remove a task from the list.</div>
    ${cards}
    ${addCard}`;
}

function renderLog() {
  const stats = `
    <div id="stats-bar">
      <div class="stat"><div class="stat-icon">✅</div><div class="stat-val">${log.length}</div><div class="stat-lbl">Tasks Done</div></div>
      <div class="stat"><div class="stat-icon">⭐</div><div class="stat-val">${fmtMin(totalEarned())}</div><div class="stat-lbl">Total Earned</div></div>
      <div class="stat"><div class="stat-icon">🎮</div><div class="stat-val">${fmtMin(used)}</div><div class="stat-lbl">Time Used</div></div>
    </div>`;
  if (!log.length) return stats + `
    <div class="empty-state"><div class="big">📋</div><p>No tasks yet!</p>
    <div style="color:#999;font-size:13px;margin-top:4px">Complete tasks to see them here.</div></div>`;
  return `<div style="padding-top:14px">${stats}${log.map(e=>`
    <div class="log-entry">
      <div class="log-emoji">${e.task.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="log-name">${e.task.name}</div>
        <div class="log-date">${e.date} · ${e.time}</div>
      </div>
      <div class="log-earn">+15 min</div>
    </div>`).join('')}</div>`;
}

function renderBank() {
  const b=bank(), bl=blocks();
  const stars = Array.from({length:Math.min(bl,12)}).map(()=>'⭐').join('')
    + (bl>12?`<span style="font-size:12px;color:#F5A623;font-weight:700">+${bl-12}</span>`:'');
  const amtBtns = [15,30,45,60].map(m=>
    `<button class="amount-btn${m===useAmt?' active':''}" onclick="setUseAmt(${m})">${m}m</button>`
  ).join('');
  return `
    <div style="padding-top:14px">
      <div id="bank-big">
        <div id="bank-big-label">Gaming Bank</div>
        <div id="bank-big-value">${fmtMin(b)}</div>
        <div id="bank-big-blocks">= ${bl} × 15-minute block${bl!==1?'s':''}</div>
        <div id="stars">${stars}</div>
      </div>
      <div class="card">
        <div class="card-title">🕐 When You Can Play</div>
        <div class="window-row"><span class="window-icon">🌙</span><div><div class="window-day">Friday</div><div class="window-time">6:30 PM – 8:30 PM</div></div></div>
        <div class="window-row"><span class="window-icon">☀️</span><div><div class="window-day">Saturday</div><div class="window-time">12:00 PM – 7:00 PM</div></div></div>
        <div class="window-row"><span class="window-icon">☀️</span><div><div class="window-day">Sunday</div><div class="window-time">12:00 PM – 7:00 PM</div></div></div>
        <div class="rollover">♻️ Unused time rolls over every week!</div>
      </div>
      <div class="card">
        <div class="card-title">🎮 Use Game Time</div>
        <div class="amount-row">${amtBtns}</div>
        <button id="use-btn" ${b>=useAmt?'':'disabled'} onclick="spendTime()">
          ${b>=useAmt?'✓ Use '+useAmt+' Minutes':'Not enough time saved up'}
        </button>
        ${used>0?`<div id="used-note">Used so far: ${fmtMin(used)}</div>`:''}
      </div>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchScreen(s) { screen=s; editMode=false; render(); }
function setFilter(f)    { filter=f; render(); }
function toggleEdit()    { editMode=!editMode; render(); }
function setUseAmt(m)    { useAmt=m; render(); }

function completeTask(id) {
  const task = tasks.find(t=>t.id===id);
  if (!task) return;
  const entry = {
    taskId:id, task,
    date: new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
    time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    earned: task.earn,
  };
  log = [entry,...log];
  save('gt_log_v4', log);
  showToast(task);
  render();
}

function spendTime() {
  if (bank()>=useAmt) { used+=useAmt; save('gt_used_v4',used); render(); }
}

// Delete
function askDelete(id) {
  const t = tasks.find(t=>t.id===id);
  pendingDeleteId = id;
  document.getElementById('del-emoji').textContent = t.emoji;
  document.getElementById('del-body').innerHTML = `<strong>${t.name}</strong> will be permanently removed.`;
  document.getElementById('delete-overlay').classList.add('show');
}
function closeDelete() { document.getElementById('delete-overlay').classList.remove('show'); pendingDeleteId=null; }
function confirmDelete() {
  if (!pendingDeleteId) return;
  tasks = tasks.filter(t=>t.id!==pendingDeleteId);
  save('gt_tasks_v4',tasks);
  closeDelete(); render();
}

// Add activity
function openAdd() {
  newEmoji='🎯'; newCat='Custom'; newDur='15 min';
  document.getElementById('new-name').value='';
  document.getElementById('add-error').style.display='none';

  // Emoji grid
  document.getElementById('emoji-grid').innerHTML = EMOJI_OPTIONS.map(e=>
    `<div class="emoji-opt${e===newEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');

  // Category grid
  document.getElementById('cat-grid').innerHTML = CAT_OPTIONS.map(c=>
    `<div class="cat-opt${c===newCat?' selected':''}" onclick="selectCat('${c}')">${c}</div>`
  ).join('');

  // Duration row
  document.getElementById('dur-row').innerHTML = DUR_OPTIONS.map(d=>
    `<button class="dur-btn${d===newDur?' selected':''}" onclick="selectDur('${d}')">${d}</button>`
  ).join('');

  document.getElementById('add-overlay').classList.add('show');
}
function closeAdd() { document.getElementById('add-overlay').classList.remove('show'); }

function selectEmoji(e) {
  newEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent===e));
}
function selectCat(c) {
  newCat=c;
  document.querySelectorAll('.cat-opt').forEach(el => el.classList.toggle('selected', el.textContent===c));
}
function selectDur(d) {
  newDur=d;
  document.querySelectorAll('.dur-btn').forEach(el => el.classList.toggle('selected', el.textContent===d));
}

function saveNewTask() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('add-error').style.display='block'; return; }
  document.getElementById('add-error').style.display='none';
  const task = { id:nextId(), emoji:newEmoji, name, duration:newDur, earn:15, category:newCat };
  tasks = [...tasks, task];
  save('gt_tasks_v4', tasks);
  closeAdd();
  filter='All';
  render();
  showToast({emoji:newEmoji, name:'Activity added: '+name});
}

function showToast(task) {
  const el = document.getElementById('toast');
  document.getElementById('toast-name').textContent = task.emoji+' '+task.name;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
